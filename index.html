<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Initializing...</title>

        <style>
            body {
                margin: 0;
                background: #000;
                color: #00ff88;
                font-family: monospace;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            #terminal {
                width: 90%;
                max-width: 700px;
                font-size: 14px;
                line-height: 1.6;
                white-space: pre-wrap;
            }

            .cursor::after {
                content: "_";
                animation: blink 1s infinite;
            }

            @keyframes blink {
                0%,
                50%,
                100% {
                    opacity: 1;
                }
                25%,
                75% {
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <div id="terminal" class="cursor"></div>

        <script>
            const EVERY_TIME_INTRO = true;

            if (!EVERY_TIME_INTRO && sessionStorage.getItem("introPlayed")) {
                window.location.href = "home.html";
            }

            const terminal = document.getElementById("terminal");

            const lines = [
                "> booting portfolio system...",
                "> loading developer profile...",
                "> user: _justParrot",
                "> initializing modules...",
            ];

            let lineIndex = 0;
            let charIndex = 0;

            function typeLine() {
                if (lineIndex >= lines.length) {
                    terminal.innerHTML += "\n> loading assets...\n";
                    startLoadingBar();
                    return;
                }

                if (charIndex < lines[lineIndex].length) {
                    terminal.innerHTML += lines[lineIndex][charIndex];
                    charIndex++;
                    setTimeout(typeLine, 25);
                } else {
                    terminal.innerHTML += "\n";
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeLine, 400);
                }
            }

            function startLoadingBar() {
                let progress = 0;
                const totalBlocks = 20;

                const interval = setInterval(() => {
                    progress++;

                    const filled = Math.floor((progress / 100) * totalBlocks);
                    const empty = totalBlocks - filled;

                    const bar =
                        "[" +
                        "█".repeat(filled) +
                        "░".repeat(empty) +
                        `] ${progress}%`;

                    const lines = terminal.innerHTML.split("\n");
                    lines[lines.length - 1] = "> " + bar;
                    terminal.innerHTML = lines.join("\n");

                    if (progress >= 100) {
                        clearInterval(interval);
                        terminal.innerHTML += "\n> access granted.";
                        sessionStorage.setItem("introPlayed", "true");

                        setTimeout(() => {
                            window.location.href = "home.html";
                        }, 1000);
                    }
                }, 30);
            }

            typeLine();
        </script>
    </body>
</html>
